name: eramakoti
description: "eRamakoti - Digital Sri Rama Nama Writing"
publish_to: 'none'

version: 40.0.0+44
environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.1.1
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_storage: ^13.0.1
  go_router: ^16.2.1
  google_sign_in: 6.2.1
  flutter_facebook_auth: ^7.1.2
  url_launcher: ^6.3.0
  audioplayers: ^6.1.0
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.1
  timezone: ^0.11.0
  confetti: ^0.8.0
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  http: ^1.2.2
  package_info_plus: ^8.0.0
  share_plus: ^10.0.2
  image_picker: ^1.1.2
  image: ^4.2.0
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/audio/jaisriramtone.mp3
    - assets/audio/temple_bell.mp3
    - assets/content/ma_asayam/
    - assets/data/certificate_texts.json

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon.png
  min_sdk_android: 21